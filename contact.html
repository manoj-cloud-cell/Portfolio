<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin:0;
            padding:0;
        }

        header{
            background:black;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            width:40%;
            margin:40px auto;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background:black;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            transition: 0.3s;
        }

        button:hover{
            background:gray;
            transform: scale(0.9);
        }

        footer{
            text-align:center;
            padding:15px;
            background:black;
            color:white;
            position:fixed;
            bottom:0;
            width:100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Contact Us</h1>
</header>

<div class="container">
    <form>

        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Message</label>
        <textarea rows="5" placeholder="Write your message"></textarea>

        <button type="submit">Send Message</button>

    </form>
</div>

<footer>
    <p>© 2026 My Website | Contact Page</p>
</footer>

</body>
</html>
