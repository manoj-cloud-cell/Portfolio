<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>PROJECTS</title>
    <style>
        header{
            margin: 0px;
            background-color: black;
            text-align: center;
            width: 100%;
            height: 60px;
            color: aliceblue;
            padding-top: 35px;
            font-size: 32px;
            border-radius: 15px;
        }
        section{
            display: flex;
            justify-content: center;
            gap: 45px;
        }
        section div{
            height: 190px;
            width: 290px;
            margin-top: 150px;
            background-color: rgb(61, 66, 66);
            display: flex;
            justify-content: center;
            align-items:center;
            border: 1px solid grey;
            border-radius: 100px;
            font-size:12px;
            text-align: center;
            transition: 0.3s;
        }
        section div:hover{
            transform: scale(0.9);
            color: rgb(95, 92, 92);
        } 
    </style>
</head>
<body>
    <header><strong>MY PROJECTS</strong></header>
    <section>
        <div>
        <h2>STUDENT MANAGMENT SYSTEM</h2>
        </div>
        <div><h2 >INSURANCE POLACY SYSTEM</h2></div>
        <div><h2>TICKET BOOKING</h2></div>
    </section>
</body>

</html>
